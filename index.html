    <!-- Search bar -->

    <!-- Category filter -->
    <div class="filter-bar" id="filterBar">

    <div class="article-list" id="articleList">

      <!-- Article 3 (newest) -->
      <a href="articles/为什么我们会拎不清？.html" class="article-card fade-up" data-tag="自我觉察" data-title="为什么我们会&quot;拎不清&quot;？" data-content="下班后还在优化代码？我以为这是理性的判断，但其实……">

      <!-- Article 1 (older) -->

        <div class="card-meta">
          <span class="card-tag">心理</span>
          <span class="card-date">2026年4月</span>
        </div>

    <p class="search-empty" id="searchEmpty">没有找到相关文章</p>
  </main>

  <script>
    (function () {
      const btns     = document.querySelectorAll('.filter-btn');
      const cards    = document.querySelectorAll('.article-card');
      const searchIn = document.getElementById('searchInput');
      const clearBtn = document.getElementById('searchClear');
      const emptyMsg = document.getElementById('searchEmpty');

      let currentTag = '全部';
      let currentQ   = '';

      function filterCards() {
        let visible = 0;
        cards.forEach(function (card) {
          const matchTag = currentTag === '全部' || card.dataset.tag === currentTag;
          const q = currentQ.trim();
          const matchQ = !q
            || card.dataset.title.includes(q)
            || card.dataset.content.includes(q)
            || card.dataset.tag.includes(q);
          if (matchTag && matchQ) {
            card.style.display = '';
            visible++;
          } else {
            card.style.display = 'none';
          }
        });
        emptyMsg.style.display = visible === 0 ? 'block' : 'none';
      }

      btns.forEach(function (btn) {
        btn.addEventListener('click', function () {
          btns.forEach(function (b) { b.classList.remove('active'); });
          btn.classList.add('active');
          currentTag = btn.dataset.filter;
          filterCards();
        });
      });

      searchIn.addEventListener('input', function () {
        currentQ = searchIn.value;
        clearBtn.style.display = currentQ ? 'flex' : 'none';
        filterCards();
      });

      clearBtn.addEventListener('click', function () {
        searchIn.value = '';
        currentQ = '';
        clearBtn.style.display = 'none';
        filterCards();
        searchIn.focus();
      });
    })();

    // ── 碎碎念预览（取想法和生活记录中最新的那条） ────────────────────────────
    (function () {
      var ts = '?t=' + Date.now();

      // 解析时间戳，用于比较两个条目哪个更新
      function parseDate(str) {
        try {
          var cleaned = str.replace(/[（(].*[）)]/, '').trim();
          var parts = cleaned.split(' ');
          var datePart = parts[0];
          var timePart = parts[1] || '00:00';
          var y = parseInt(datePart.split('-')[0]);
          var m = parseInt(datePart.split('-')[1]) - 1;
          var d = parseInt(datePart.split('-')[2]);
          var h = parseInt(timePart.split(':')[0]);
          var min = parseInt(timePart.split(':')[1]);
          var dt = new Date(y, m, d, h, min);
          if (isNaN(dt.getTime())) return new Date(0);
          return dt;
        } catch(e) { return new Date(0); }
      }

      function fetchLatest(url, file) {
        return fetch(url + ts)
          .then(function (r) { return r.ok ? r.json() : []; })
          .then(function (files) {
            if (!Array.isArray(files) || files.length === 0 || !files[0]) return null;
            return fetch(file + files[0] + ts)
              .then(function (r) { return r.ok ? r.json() : null; });
          });
      }

      var p1 = fetchLatest('moments/index.json', 'moments/');
      var p2 = fetchLatest('life/index.json', 'life/');

      Promise.all([p1, p2]).then(function (results) {
        var candidates = results.filter(Boolean);
        if (candidates.length === 0) return;

        candidates.sort(function (a, b) {
          return parseDate(b.date) - parseDate(a.date);
        });

        var latest = candidates[0];
        var previewText = latest.text.split(/\n+/).filter(function (p) { return p.trim().length > 0; }).join(' / ');
        document.getElementById('momentsPreviewText').textContent = previewText;
        document.getElementById('momentsPreviewTime').textContent = latest.date;
        if (latest.image) {
          var thumb = document.getElementById('momentsPreviewThumb');
          thumb.src = latest.image;
          thumb.style.display = 'block';
        }
        document.getElementById('momentsPreview').style.display = 'block';
      }).catch(function () {});
    })();

    // ── 深色模式 ─────────────────────────────
    (function () {
      var btn = document.getElementById('themeToggle');
      if (!btn) return;
      if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
        btn.textContent = '☀️';
      }
      btn.addEventListener('click', function () {
        var isDark = document.body.classList.toggle('dark');
        btn.textContent = isDark ? '☀️' : '🌙';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
      });
    })();
  </script>

  <footer>
    <div class="container">
      © 2026 梁飞飞 · 写得随意，读得开心
