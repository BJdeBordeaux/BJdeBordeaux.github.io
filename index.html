<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>梁飞飞 · 写东西的地方</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
</head>
<body>

  <header>
    <div class="container">
      <a href="index.html" class="site-title">梁飞飞<span>·</span>写东西的地方</a>
      <p class="tagline">大巴黎 · 程序员 · 偶尔写写</p>
    </div>
  </header>

  <div class="divider"></div>

  <main class="container">

    <!-- Category filter -->
    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" data-filter="全部">全部</button>
      <button class="filter-btn" data-filter="心理">心理</button>
    </div>

    <div class="article-list" id="articleList">

      <!-- Article 2 (newer) -->
      <a href="articles/发现我不存在之后.html" class="article-card fade-up" data-tag="心理">
        <div class="card-meta">
          <span class="card-tag">心理</span>
          <span class="card-date">2026年4月</span>
        </div>
        <h2>发现我不存在之后</h2>
        <p class="card-excerpt">
          不存在的人，不需要担心得失，不需要担心荣辱，甚至不需要担心生死。真好啊，就这么感受这世界。
        </p>
        <span class="card-read">继续读 →</span>
      </a>

      <!-- Article 1 (older) -->
      <a href="articles/完美生活的决定.html" class="article-card fade-up" data-tag="心理">
        <div class="card-meta">
          <span class="card-tag">心理</span>
          <span class="card-date">2026年4月</span>
        </div>
        <h2>完美生活的决定</h2>
        <p class="card-excerpt">
          完美的生活，不是一个目的地，而是一个决定——决定当下就是。
        </p>
        <span class="card-read">继续读 →</span>
      </a>

    </div>
  </main>

  <script>
    (function () {
      const btns = document.querySelectorAll('.filter-btn');
      const cards = document.querySelectorAll('.article-card');

      btns.forEach(function (btn) {
        btn.addEventListener('click', function () {
          const filter = btn.dataset.filter;

          // toggle active
          btns.forEach(function (b) { b.classList.remove('active'); });
          btn.classList.add('active');

          // show / hide cards
          cards.forEach(function (card) {
            if (filter === '全部' || card.dataset.tag === filter) {
              card.style.display = '';
            } else {
              card.style.display = 'none';
            }
          });
        });
      });
    })();
  </script>

  <footer>
    <div class="container">
      © 2026 梁飞飞 · 写得随意，读得开心
    </div>
  </footer>

</body>
</html>
