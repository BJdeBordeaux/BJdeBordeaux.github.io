<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">加载中… · 梁飞飞</title>

  <!-- Open Graph / 微信分享卡片 -->
  <meta property="og:title"       id="ogTitle"       content="">
  <meta property="og:description" id="ogDesc"        content="">
  <meta property="og:image"       id="ogImage"       content="">
  <meta property="og:url"         id="ogUrl"         content="">
  <meta property="og:type"        content="article">

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       id="twTitle"       content="">
  <meta name="twitter:description" id="twDesc"        content="">
  <meta name="twitter:image"       id="twImage"       content="">

  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
</head>
<body>

  <header>
    <div class="container">
      <div class="header-nav">
        <a href="index.html" class="site-title">梁飞飞<span>·</span>写东西的地方</a>
        <a href="about.html" class="nav-about">关于我</a>
      </div>
      <p class="tagline">大巴黎 · 程序员 · 偶尔写写</p>
    </div>
  </header>

  <div class="divider"></div>

  <main class="container">
    <article class="article-page">

      <a href="index.html" class="article-back">← 返回首页</a>

      <header class="article-header">
        <h1 id="articleTitle">加载中…</h1>
        <div class="article-meta">
          <span class="meta-tag" id="articleTag">—</span>
          <span class="meta-date" id="articleDate">—</span>
        </div>
      </header>

      <div class="article-body" id="articleBody">
        <p style="color:var(--muted)">正在加载…</p>
      </div>

      <!-- Share -->
      <div class="share-section">
        <p class="share-label">转发给朋友</p>
        <div class="share-btns">
          <button class="share-btn share-native" id="shareNative" title="分享">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            分享
          </button>
        </div>
      </div>

    </article>
  </main>

  <footer>
    <div class="container">
      © 2026 梁飞飞 · 写得随意，读得开心
    </div>
  </footer>

  <!-- marked.js for Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- DOMPurify for sanitization -->
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>

  <script>
    (function() {
      const params = new URLSearchParams(location.search);
      const file   = params.get('file');
      const siteBase = location.protocol + '//' + location.host;

      if (!file) {
        document.getElementById('articleBody').innerHTML = '<p style="color:#e55;">缺少文件参数，<a href="index.html">返回首页</a></p>';
        return;
      }

      const mdFile   = 'articles/' + decodeURIComponent(file) + '.md';
      const pageUrl = siteBase + '/article.html?file=' + encodeURIComponent(file);

      // Pre-set og:url immediately so crawlers see it
      document.getElementById('ogUrl').content = pageUrl;

      fetch(mdFile)
        .then(r => {
          if (!r.ok) throw new Error('文件不存在');
          return r.text();
        })
        .then(text => {
          let content = text;
          let meta    = {};

          // ── YAML front-matter ─────────────────────────────────
          if (content.startsWith('---')) {
            const end = content.indexOf('---', 3);
            if (end !== -1) {
              const yaml   = content.slice(3, end).trim();
              content      = content.slice(end + 3).trim();

              yaml.split('\n').forEach(line => {
                const colon = line.indexOf(':');
                if (colon === -1) return;
                const key = line.slice(0, colon).trim();
                const val = line.slice(colon + 1).trim();
                meta[key] = val;
              });
            }
          }

          // ── First image from Markdown ─────────────────────────
          let ogImage = siteBase + '/images/default-cover.jpg';
          const imgMatch = content.match(/!\[.*?\]\((.*?)\)/);
          if (imgMatch) {
            const src = imgMatch[1].trim();
            if (src.startsWith('http://') || src.startsWith('https://')) {
              ogImage = src;
            } else {
              ogImage = siteBase + '/' + src.replace(/^\//, '');
            }
          }
          // Override with explicit image in front-matter if set
          if (meta.image) {
            const explicit = meta.image.trim();
            if (explicit.startsWith('http')) {
              ogImage = explicit;
            } else {
              ogImage = siteBase + '/' + explicit.replace(/^\//, '');
            }
          }

          const title = meta.title    || '无标题';
          const desc  = meta.desc     || meta.description || '';
          const tag   = meta.tag      || '';
          const date  = meta.date     || '';

          // ── Set page title & headings ────────────────────────
          document.getElementById('pageTitle').textContent    = title + ' · 梁飞飞';
          document.getElementById('articleTitle').textContent = title;
          document.getElementById('articleTag').textContent   = tag;
          document.getElementById('articleDate').textContent = date;

          // ── Set OG / Twitter Card meta tags ───────────────────
          document.getElementById('ogTitle').content  = title;
          document.getElementById('ogDesc').content   = desc;
          document.getElementById('ogImage').content  = ogImage;
          document.getElementById('twTitle').content  = title;
          document.getElementById('twDesc').content   = desc;
          document.getElementById('twImage').content  = ogImage;

          // Also update document.title for consistency
          document.title = title + ' · 梁飞飞';

          // ── Render Markdown body ──────────────────────────────
          const html = DOMPurify.sanitize(marked.parse(content));
          document.getElementById('articleBody').innerHTML = html;

          // ── Update share buttons with resolved title ───────────
          initShare(title);
        })
        .catch(() => {
          document.getElementById('articleBody').innerHTML =
            '<p style="color:#e55;">文章加载失败，<a href="index.html">返回首页</a></p>';
        });
    })();

    function initShare(title) {
      const articleUrl = location.href;
      document.getElementById('shareNative').addEventListener('click', async () => {
        if (navigator.share) {
          try { await navigator.share({ title, url: articleUrl }); } catch(e) {}
        } else {
          navigator.clipboard.writeText(articleUrl);
        }
      });
    }
  </script>

</body>
</html>
