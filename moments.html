<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>碎碎念 · 梁飞飞</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
</head>
<body>

  <header>
    <div class="container">
      <div class="header-nav">
        <a href="https://bjdebordeaux.github.io/" class="site-title">梁飞飞<span>·</span>写东西的地方</a>
        <a href="about.html" class="nav-about">关于我</a>
      </div>
      <p class="tagline">大巴黎 · 程序员 · 偶尔写写</p>
    </div>
  </header>

  <div class="divider"></div>

  <main class="container">
    <div class="moments-page">

      <a href="https://bjdebordeaux.github.io/" class="article-back">← 返回首页</a>

      <div class="moments-header">
        <h1 class="moments-title">碎碎念</h1>
        <p class="moments-desc">随手的想法，不成体系，但都是真的。</p>
      </div>

      <div class="moments-timeline" id="momentsList">
        <p style="color:var(--muted); text-align:center; padding: 60px 0; font-size:0.88rem; letter-spacing:0.06em;">加载中…</p>
      </div>

    </div>
  </main>

  <footer>
    <div class="container">
      © 2026 梁飞飞 · 写得随意，读得开心
    </div>
  </footer>

  <!-- 图片弹窗 -->
  <div class="moment-lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="图片预览">
    <button class="lightbox-close" id="lightboxClose" aria-label="关闭">×</button>
    <img class="lightbox-img" id="lightboxImg" src="" alt="">
  </div>

  <script>
    (function () {
      const list     = document.getElementById('momentsList');
      const lightbox = document.getElementById('lightbox');
      const lbImg    = document.getElementById('lightboxImg');
      const lbClose  = document.getElementById('lightboxClose');

      // ── 打开 / 关闭弹窗 ────────────────────────
      function openLightbox(src, alt) {
        lbImg.src = src;
        lbImg.alt = alt || '';
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';
      }
      function closeLightbox() {
        lightbox.classList.remove('active');
        document.body.style.overflow = '';
        lbImg.src = '';
      }

      lbClose.addEventListener('click', closeLightbox);
      lightbox.addEventListener('click', function (e) {
        if (e.target === lightbox) closeLightbox();
      });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closeLightbox();
      });

      // ── 渲染时间线 ──────────────────────────────
      function render(items) {
        if (!items || items.length === 0) {
          list.innerHTML = '<p style="color:var(--muted);text-align:center;padding:60px 0;font-size:0.88rem;">还没有碎碎念。</p>';
          return;
        }

        list.innerHTML = items.map(function (item, i) {
          const imgHtml = item.image
            ? '<div class="moment-thumb-wrap"><img class="moment-thumb" src="' + item.image + '" alt="配图" loading="lazy" data-src="' + item.image + '"></div>'
            : '';
          return (
            '<div class="moment-item fade-up" style="animation-delay:' + (i * 0.06) + 's">' +
              '<div class="moment-dot"></div>' +
              '<div class="moment-content">' +
                '<time class="moment-time">' + item.date + '</time>' +
                '<p class="moment-text">' + escHtml(item.text) + '</p>' +
                imgHtml +
              '</div>' +
            '</div>'
          );
        }).join('');

        // 绑定图片点击
        list.querySelectorAll('.moment-thumb').forEach(function (img) {
          img.addEventListener('click', function () {
            openLightbox(img.dataset.src, img.alt);
          });
        });
      }

      function escHtml(str) {
        return str
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/\n/g, '<br>');
      }

      // ── 获取数据 ────────────────────────────────
      fetch('moments.json?t=' + Date.now())
        .then(function (r) {
          if (!r.ok) throw new Error('fetch failed');
          return r.json();
        })
        .then(render)
        .catch(function () {
          list.innerHTML = '<p style="color:#e55;text-align:center;padding:40px 0;">加载失败，请刷新重试。</p>';
        });
    })();
  </script>

</body>
</html>
