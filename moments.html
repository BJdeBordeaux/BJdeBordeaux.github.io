<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>碎碎念 · 梁飞飞</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
  <style>
    .moments-page { padding: 0 0 60px; }
    .moments-header { text-align: center; margin-bottom: 40px; }
    .moments-title { font-size: 1.6rem; font-weight: 600; margin-bottom: 8px; }
    .moments-desc { color: var(--muted); font-size: 0.9rem; }

    .timelines-wrapper {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
    }
    @media (max-width: 768px) {
      .timelines-wrapper { grid-template-columns: 1fr; gap: 60px; }
    }

    .timeline-section {}
    .timeline-title {
      font-size: 1.1rem;
      font-weight: 500;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }

    .moments-timeline { position: relative; }
    .moments-timeline::before {
      content: '';
      position: absolute;
      left: 6px;
      top: 8px;
      bottom: 0;
      width: 2px;
      background: var(--border);
    }

    .moment-item {
      position: relative;
      padding-left: 28px;
      margin-bottom: 28px;
    }
    .moment-dot {
      position: absolute;
      left: 0;
      top: 6px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--bg);
      border: 2px solid var(--accent);
    }
    .moment-time {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.03em;
    }
    .moment-text {
      line-height: 1.7;
      color: var(--text);
      margin: 0;
    }
    .moment-text-para { margin-bottom: 0.8em; }
    .moment-text-para:last-child { margin-bottom: 0; }

    .moment-thumb-wrap {
      margin-top: 12px;
    }
    .moment-thumb {
      max-width: 100%;
      max-height: 200px;
      border-radius: 8px;
      cursor: zoom-in;
      transition: opacity 0.2s;
    }
    .moment-thumb:hover { opacity: 0.9; }

    .moment-lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s, visibility 0.3s;
      z-index: 1000;
    }
    .moment-lightbox.active { opacity: 1; visibility: visible; }
    .lightbox-img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 4px;
    }
    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 2rem;
      color: #fff;
      background: none;
      border: none;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .lightbox-close:hover { opacity: 1; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.5s ease forwards; opacity: 0; }
  </style>
</head>
<body>

  <header>
    <div class="container">
      <div class="header-nav">
        <a href="https://bjdebordeaux.github.io/" class="site-title">梁飞飞<span>·</span>写东西的地方</a>
        <a href="about.html" class="nav-about">关于我</a>
        <button class="theme-toggle" id="themeToggle" title="切换深色模式" aria-label="切换深色模式">🌙</button>
      </div>
      <p class="tagline">大巴黎 · 程序员 · 偶尔写写</p>
    </div>
  </header>

  <div class="divider"></div>

  <main class="container">
    <div class="moments-page">

      <a href="https://bjdebordeaux.github.io/" class="article-back">← 返回首页</a>

      <div class="moments-header">
        <h1 class="moments-title">碎碎念</h1>
        <p class="moments-desc">随手的想法和生活记录。</p>
      </div>

      <div class="timelines-wrapper">
        <!-- 左边：碎碎念 -->
        <div class="timeline-section">
          <h2 class="timeline-title">💭 想法</h2>
          <div class="moments-timeline" id="thoughtsList">
            <p style="color:var(--muted); text-align:center; padding: 40px 0; font-size:0.88rem;">加载中…</p>
          </div>
        </div>

        <!-- 右边：生活记录 -->
        <div class="timeline-section">
          <h2 class="timeline-title">📝 生活</h2>
          <div class="moments-timeline" id="lifeList">
            <p style="color:var(--muted); text-align:center; padding: 40px 0; font-size:0.88rem;">加载中…</p>
          </div>
        </div>
      </div>

    </div>
  </main>

  <footer>
    <div class="container">
      © 2026 梁飞飞 · 写得随意，读得开心
    </div>
  </footer>

  <!-- 图片弹窗 -->
  <div class="moment-lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="图片预览">
    <button class="lightbox-close" id="lightboxClose" aria-label="关闭">×</button>
    <img class="lightbox-img" id="lightboxImg" src="" alt="">
  </div>

  <script>
    (function () {
      const lightbox = document.getElementById('lightbox');
      const lbImg    = document.getElementById('lightboxImg');
      const lbClose  = document.getElementById('lightboxClose');

      // ── 打开 / 关闭弹窗 ────────────────────────
      function openLightbox(src, alt) {
        lbImg.src = src;
        lbImg.alt = alt || '';
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';
      }
      function closeLightbox() {
        lightbox.classList.remove('active');
        document.body.style.overflow = '';
        lbImg.src = '';
      }

      lbClose.addEventListener('click', closeLightbox);
      lightbox.addEventListener('click', function (e) {
        if (e.target === lightbox) closeLightbox();
      });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closeLightbox();
      });

      // ── 渲染时间线 ──────────────────────────────
      function render(container, items) {
        if (!items || items.length === 0) {
          container.innerHTML = '<p style="color:var(--muted);text-align:center;padding:40px 0;font-size:0.88rem;">还没有内容。</p>';
          return;
        }

        container.innerHTML = items.map(function (item, i) {
          const imgHtml = item.image
            ? '<div class="moment-thumb-wrap"><img class="moment-thumb" src="' + item.image + '" alt="配图" loading="lazy" data-src="' + item.image + '"></div>'
            : '';
          return (
            '<div class="moment-item fade-up" style="animation-delay:' + (i * 0.06) + 's">' +
              '<div class="moment-dot"></div>' +
              '<div class="moment-content">' +
                '<time class="moment-time">' + item.date + '</time>' +
                textToParas(item.text) +
                imgHtml +
              '</div>' +
            '</div>'
          );
        }).join('');

        // 绑定图片点击
        container.querySelectorAll('.moment-thumb').forEach(function (img) {
          img.addEventListener('click', function () {
            openLightbox(img.dataset.src, img.alt);
          });
        });
      }

      // 把文本转成段落 HTML
      function textToParas(str) {
        var escaped = str
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
        var paras = escaped.split(/\n+/).filter(function (p) {
          return p.trim().length > 0;
        });
        if (paras.length === 0) return '';
        if (paras.length === 1) return '<p class="moment-text">' + paras[0] + '</p>';
        return paras.map(function (p) {
          return '<p class="moment-text moment-text-para">' + p + '</p>';
        }).join('');
      }

      // ── 加载时间线数据 ─────────────────────────
      function loadTimeline(containerId, indexUrl) {
        var container = document.getElementById(containerId);
        var ts = '?t=' + Date.now();

        fetch(indexUrl + ts)
          .then(function (r) { return r.ok ? r.json() : []; })
          .then(function (files) {
            if (!files || files.length === 0) { render(container, []); return; }
            return Promise.all(files.map(function (f) {
              return fetch(indexUrl.replace('index.json', '') + f + ts)
                .then(function (r) { return r.ok ? r.json() : null; })
                .catch(function () { return null; });
            }));
          })
          .then(function (items) {
            render(container, (items || []).filter(Boolean));
          })
          .catch(function () {
            container.innerHTML = '<p style="color:#e55;text-align:center;padding:40px 0;">加载失败。</p>';
          });
      }

      // 加载两条时间线
      loadTimeline('thoughtsList', 'moments/index.json');
      loadTimeline('lifeList', 'life/index.json');

      // ── 深色模式 ─────────────────────────────
      (function () {
        var btn = document.getElementById('themeToggle');
        if (!btn) return;
        if (localStorage.getItem('theme') === 'dark') {
          document.body.classList.add('dark');
          btn.textContent = '☀️';
        }
        btn.addEventListener('click', function () {
          var isDark = document.body.classList.toggle('dark');
          btn.textContent = isDark ? '☀️' : '🌙';
          localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });
      })();
    })();
  </script>

</body>
</html>
